# Per-detector parameters. Pre-calibration thresholds only; calibrated
# decision boundaries live in the reliability curves produced by the
# calibration layer at runtime.
#
# Parameter semantics are authoritative in
# docs/methodology/calibration-methodology.md. Values below mirror the
# defaults listed in docs/architecture/system-design.md §Layer 3 table;
# tune against the historical corpus before live deployment.

[price_velocity]
hazard_rate = 0.004            # 1/250
fire_threshold = 0.7
resolution_exclusion_seconds = 21600

[volume_spike]
ewma_alpha = 0.05
target_fdr_q = 0.05

[book_imbalance]
depth_levels = 5
bullish_threshold = 0.72
bearish_threshold = 0.28
persistence_snapshots = 3
minimum_total_depth = 5000.0

[cross_market]
window_seconds = 14400
min_historical_correlation = 0.6
activity_floor = 1.0

[regime_shift]
target_alpha = 0.02
k_multiplier = 0.5
h_multiplier = 4.0
dormancy_minimum_seconds = 21600
