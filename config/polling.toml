# Adaptive polling parameters. Schema matches the configuration block
# in docs/architecture/adaptive-polling-spec.md §Configuration verbatim.
# Values below are the documented defaults; the ingestion scheduler
# consumes this file at startup.

[polling]
hot_interval_s = 15
warm_interval_s = 30
cool_interval_s = 60
cold_interval_s = 300

[polling.hysteresis]
hot_promote = 2.2
hot_demote = 1.8
warm_promote = 1.5
warm_demote = 1.3
cool_promote = 1.1
cool_demote = 0.9

[polling.platform_caps]
polymarket_per_min = 600
kalshi_per_min = 1000
budget_safety_pct = 0.7

[polling.backoff]
initial_s = 1
max_s = 60
max_retries = 5
demote_after_consecutive_failures = 10
remove_after_consecutive_failures = 50
