# Prometheus scrape config for the local smoke stack.
#
# Scrapes the host-bound /metrics endpoints workers expose on
# localhost:9091..9097. When running workers inside `docker compose`
# alongside Prometheus, replace `host.docker.internal` with the
# service name and match the port the worker binds to.

global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: augur-workers
    static_configs:
      - targets:
          - host.docker.internal:9091
          - host.docker.internal:9092
          - host.docker.internal:9093
          - host.docker.internal:9094
          - host.docker.internal:9095
          - host.docker.internal:9096
          - host.docker.internal:9097
        labels:
          stack: smoke
