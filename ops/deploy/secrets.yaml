# Secret scaffolding.
#
# Do NOT commit real credentials. This manifest is an allowlist of
# the env vars workers expect; populate the values via
# `kubectl create secret generic augur-secrets --from-literal=...` or
# Kustomize secretGenerator.
apiVersion: v1
kind: Secret
metadata:
  name: augur-secrets
  namespace: augur
type: Opaque
stringData:
  # DSN for TimescaleDB primary.
  AUGUR_TIMESCALE_URL: ""
  # URL for the Redis bus backend, if used.
  REDIS_URL: ""
  # NATS credentials file path inside the mounted volume.
  NATS_CREDENTIALS_FILE: ""
  # Anthropic API key for the cloud LLM backend (only if enabled).
  ANTHROPIC_API_KEY: ""
