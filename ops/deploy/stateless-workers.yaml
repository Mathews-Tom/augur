# Stateless worker deployments.
#
# manipulation / calibration / context_format are stateless and scale
# freely. feature / detector workers shard by market_id modulo
# REPLICA_COUNT — resizing their pools requires an operator edit of
# `replicas` and a rolling restart so the new count propagates to
# every REPLICA_COUNT env var. HPA does NOT manage these pools;
# dynamic replica count would silently drop shards.
#
# Every deployment exposes /metrics on port 9090 and is covered by
# a TCP readiness/liveness probe so rolling updates admit traffic
# only after the listener is live.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: augur-feature
  namespace: augur
  labels:
    app.kubernetes.io/component: feature
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: feature
  template:
    metadata:
      labels:
        app.kubernetes.io/component: feature
    spec:
      containers:
        - name: feature
          image: ghcr.io/aetherforge/augur:latest
          command: ["python", "-m"]
          args:
            - augur_signals.workers.feature
            - --shard
            - $(REPLICA_INDEX)/$(REPLICA_COUNT)
          env:
            - name: REPLICA_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            - name: REPLICA_COUNT
              value: "2"
          envFrom:
            - secretRef:
                name: augur-secrets
          volumeMounts:
            - name: config
              mountPath: /app/config
          ports:
            - name: metrics
              containerPort: 9090
          readinessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: augur-config
---
