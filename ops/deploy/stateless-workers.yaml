          env:
            - name: REPLICA_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            - name: REPLICA_COUNT
              value: "2"
          envFrom:
            - secretRef:
                name: augur-secrets
          volumeMounts:
            - name: config
              mountPath: /app/config
          ports:
            - name: metrics
              containerPort: 9090
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: augur-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: augur-manipulation
  namespace: augur
  labels:
    app.kubernetes.io/component: manipulation
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: manipulation
  template:
    metadata:
      labels:
        app.kubernetes.io/component: manipulation
    spec:
      containers:
        - name: manipulation
          image: ghcr.io/aetherforge/augur:latest
          command: ["python", "-m"]
          args: [augur_signals.workers.manipulation]
          envFrom:
            - secretRef:
                name: augur-secrets
          volumeMounts:
            - name: config
              mountPath: /app/config
          ports:
            - name: metrics
              containerPort: 9090
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: augur-config
