apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: augur

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - pollers.yaml
  - stateless-workers.yaml
  - singletons.yaml
  - services.yaml
  - hpa.yaml
  - servicemonitor.yaml

images:
  - name: ghcr.io/aetherforge/augur
    newTag: latest

commonLabels:
  app.kubernetes.io/part-of: augur
