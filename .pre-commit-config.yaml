repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy --strict (workspace env)
        entry: uv run mypy --strict src/
        language: system
        types: [python]
        pass_filenames: false

      - id: llm-import-guard
        name: Guard against LLM imports in augur_signals
        entry: bash -c 'if grep -rE "^[[:space:]]*(from|import)[[:space:]]+(anthropic|openai|ollama|llama|llama_index|langchain|langchain_[a-z_]+|transformers|huggingface_hub|sentence_transformers|vllm|mistralai|cohere|google\.generativeai|replicate)([[:space:]]|\.|$)" src/augur_signals/; then echo "LLM import in src/augur_signals/ is forbidden by docs/architecture/system-design.md"; exit 1; fi'
        language: system
        pass_filenames: false

      - id: forbidden-token-doc-lint
        name: Reject causal-narrative phrases in docs/
        entry: bash -c 'set -e; if grep -rE "\b(may be driven by|consistent with new information|potentially indicates|likely reflects|suggests that)\b" docs/ | grep -v "docs/methodology/calibration-methodology.md"; then echo "Causal-narrative phrase in docs/"; exit 1; fi'
        language: system
        pass_filenames: false

      - id: secret-scan
        name: Scan for hardcoded secrets in src/ and config/
        entry: bash -c 'if grep -rE "(api_key|password|secret|token)\s*=\s*[\"'\''][^\"'\'']{20,}" src/ config/ 2>/dev/null; then echo "Possible hardcoded secret"; exit 1; fi'
        language: system
        pass_filenames: false

      - id: schema-export-check
        name: Verify schemas/ is in sync with Pydantic models
        entry: bash -c 'uv run python scripts/export_schemas.py --check'
        language: system
        pass_filenames: false

      - id: datetime-now-in-detectors
        name: Guard against datetime.now() in detector modules
        entry: bash -c 'uv run python scripts/lint_detector_now.py'
        language: system
        pass_filenames: false
